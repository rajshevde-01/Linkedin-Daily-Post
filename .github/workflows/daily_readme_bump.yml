# ============================================================
# Daily README Bump — keeps GitHub activity streak alive
# Runs every day at 08:00 AM IST (02:30 UTC)
# Updates the 📊 Live Stats table in README.md and commits.
# ============================================================

name: Daily README Bump

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 AM IST daily
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to count commits for streak

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README stats table
        working-directory: scripts
        run: python update_readme.py

      - name: Commit and push
        run: |
          DATE=$(TZ='Asia/Kolkata' date +'%Y-%m-%d')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: daily activity bump $DATE"
          git push origin HEAD:${{ github.ref }}
