# ============================================================
# PHASE 1: Generate post + send confirmation (2 PM & 5 PM IST)
# ============================================================
# Runs daily at 2:00 PM IST (8:30 AM UTC) and 5:00 PM IST (11:30 AM UTC)
# Generates the LinkedIn post and creates a GitHub Issue for review.
# User gets an email notification (via GitHub) and has 1-6 hours to respond.
# ============================================================

name: Generate Post & Send Confirmation

on:
  schedule:
    # 2:00 PM IST = 8:30 AM UTC
    # 5:00 PM IST = 11:30 AM UTC
    - cron: "30 8,11 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Date override (YYYY-MM-DD)"
        required: false
        default: ""
      custom_topic:
        description: "Provide a complete topic or idea to override today's news"
        required: false
        default: ""
      use_cve_tracker:
        description: "Run Live Incident Response Tracker (Fetch CISA Zero-Days instead of News)"
        type: boolean
        default: false
      use_knowledge_base:
        description: "Force the post to generate from your Personal Brain folder"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  generate-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "date=$(TZ='Asia/Kolkata' date -d '2 hours ago' +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          fi

      - name: Generate LinkedIn post
        id: generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        working-directory: scripts
        run: |
          CHANCE=$((1 + RANDOM % 100))
          echo "Rolled a $CHANCE for Knowledge Base probability."

          if [ "${{ github.event.inputs.use_cve_tracker }}" == "true" ]; then
            python generate_post.py --date ${{ steps.date.outputs.date }} --cve --limit 2
          elif [ "${{ github.event.inputs.use_knowledge_base }}" == "true" ]; then
            python generate_post.py --date ${{ steps.date.outputs.date }} --knowledge --limit 2
          elif [ -n "${{ github.event.inputs.custom_topic }}" ]; then
            python generate_post.py --date ${{ steps.date.outputs.date }} --topic "${{ github.event.inputs.custom_topic }}" --limit 2
          elif [ $CHANCE -le 30 ]; then
            echo "Knowledge Base triggered (<=30)!"
            python generate_post.py --date ${{ steps.date.outputs.date }} --knowledge --limit 2
          else
            echo "Using Standard News Fetcher."
            python generate_post.py --date ${{ steps.date.outputs.date }} --limit 2
          fi

      - name: Create confirmation issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: scripts
        run: |
          python notify.py \
            --action notify \
            --date ${{ steps.date.outputs.date }}

      - name: Commit generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git add custom_idea.txt || true
          git diff --staged --quiet || git commit -m "Generate LinkedIn post for ${{ steps.date.outputs.date }}"
          git push
