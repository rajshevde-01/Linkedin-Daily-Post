# ============================================================
# Weekly Digest — creates a GitHub Issue summary every Sunday
# ============================================================
# Runs every Sunday at 08:30 AM IST (03:00 UTC)
# Summarises the week's posts and any engagement metrics.
# Can also be triggered manually from the Actions tab.
# ============================================================

name: Weekly Digest

on:
  schedule:
    - cron: "0 3 * * 0"    # Every Sunday at 08:30 AM IST (03:00 UTC)
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate PDF Weekly Digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: scripts
        run: |
          python weekly_digest_v2.py
          python weekly_digest.py # Keep the issue summary too

      - name: Commit PDF Digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Weekly_Digest_*.pdf || true
          git diff --staged --quiet || git commit -m "chore: add weekly technical digest PDF"
          git push
